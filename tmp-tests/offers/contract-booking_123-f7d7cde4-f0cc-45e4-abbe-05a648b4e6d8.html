<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Experience Agreement</title>
<style>
body { font-family: Arial, sans-serif; margin: 40px; color: #111; }
h1 { border-bottom: 2px solid #333; padding-bottom: 10px; }
section { margin-bottom: 24px; }
.itinerary-item { margin-bottom: 12px; }
.price-table { width: 100%; border-collapse: collapse; }
.price-table th, .price-table td { border: 1px solid #ddd; padding: 8px; }
.price-table th { background: #f7f7f7; }
.logo { max-height: 80px; }
.signature { max-height: 60px; margin-top: 32px; }
</style>
</head>
<body>
  <header>
    <img src="https://example.com/logo.svg" class="logo" alt="Logo" />
    <h1>Experience Agreement</h1>
    <p>Prepared for <strong>Sample Client</strong></p>
    <p>Experience: Safari Adventure</p>
  </header>

  <section>
    <h2>Itinerary</h2>
    <div class="itinerary-item">
        <strong>Day 1</strong> - Arrival
        <p>Airport pickup</p>
      </div>
  </section>

  <section>
    <h2>Pricing</h2>
    <table class="price-table">
      <tbody>
        <tr><th>Base</th><td>1500</td></tr>
        <tr><th>Addons</th><td>200</td></tr>
        <tr><th>Fee</th><td>75</td></tr>
        <tr><th>Discount</th><td>- 100</td></tr>
        <tr><th>Total</th><td><strong>1675</strong></td></tr>
      </tbody>
    </table>
  </section>

  <section><h2>Notes</h2><p>Remember travel insurance</p></section>

  <img src="https://example.com/signature.svg" class="signature" alt="Signature" />
</body>
</html>
